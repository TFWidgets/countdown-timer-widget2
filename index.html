<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест виджета обратного отсчета</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 50px;
            font-size: 2.5em;
        }
        .test-section {
            margin: 60px 0;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Тестирование виджетов</h1>
        
        <div class="test-section">
            <h2>Демо виджет</h2>
            <script src="https://tfwidgets.github.io/countdown-timer-widget/dist/embed.js" data-id="demo"></script>
        </div>
        
        <div class="test-section">
            <h2>Тест ошибки</h2>
            <script src="https://tfwidgets.github.io/countdown-timer-widget/dist/embed.js" data-id="nonexistent"></script>
        </div>
    </div>
</body>
</html>
