<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .container h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 30px;
        }
        
        .code-block {
            background: #2d3748;
            color: #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
            margin-bottom: 30px;
            overflow-x: auto;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            user-select: all;
        }
        
        .code-block:hover {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102,126,234,0.3);
        }
        
        .code-block.copied {
            border-color: #10b981;
            box-shadow: 0 0 20px rgba(16,185,129,0.3);
        }
        
        .widget-area {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 25px;
            }
            
            .container h1 {
                font-size: 1.8rem;
            }
            
            .widget-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Countdown Timer Widget</h1>
        
        <div class="code-block" onclick="copyCode(this)">
&lt;script src="https://countdown-timer-widget2.tf-widgets.com/embed.js" data-id="demo"&gt;&lt;/script&gt;
        </div>
        
        <div class="widget-area">
            <script src="./embed.js?v=7" data-id="demo"></script>
        </div>
    </div>

    <script>
        function copyCode(element) {
            const text = element.textContent.trim();
            navigator.clipboard.writeText(text).then(() => {
                element.classList.add('copied');
                setTimeout(() => {
                    element.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
